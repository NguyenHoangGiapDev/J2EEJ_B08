<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-img {
            width: 110px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <h2 class="text-center mb-4 text-uppercase">Quản lý sản phẩm</h2>

    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-3">
        <a th:href="@{/products/new}" class="btn btn-primary">Create New Product</a>

        <form th:action="@{/products}" method="get" class="d-flex flex-wrap gap-2">
            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Tìm theo tên..."
                   th:value="${keyword}"
                   style="width: 200px;">

            <select name="sort" class="form-select" style="width: 180px;">
                <option value="">-- Sắp xếp giá --</option>
                <option value="asc" th:selected="${sort == 'asc'}">Giá tăng dần</option>
                <option value="desc" th:selected="${sort == 'desc'}">Giá giảm dần</option>
            </select>

            <select name="categoryId" class="form-select" style="width: 180px;">
                <option value="">-- Chọn category --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${selectedCategoryId != null and selectedCategoryId == cat.id}">
                </option>
            </select>

            <button type="submit" class="btn btn-success">Search</button>
            <a th:href="@{/products}" class="btn btn-secondary">Reset</a>
        </form>
    </div>

    <table class="table table-bordered table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Image</th>
            <th>Price</th>
            <th>Category Name</th>
            <th>Action</th>
            <th>Cart</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="7" class="text-center text-danger">Không tìm thấy sản phẩm nào</td>
        </tr>

        <tr th:each="product, iterStat : ${products}">
            <td th:text="${iterStat.count}"></td>
            <td th:text="${product.name}"></td>
            <td>
                <img th:if="${product.image != null and !#strings.isEmpty(product.image)}"
                     th:src="${product.image}" alt="product image" class="product-img">
                <span th:if="${product.image == null or #strings.isEmpty(product.image)}" class="text-muted">
                    No image
                </span>
            </td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.category != null ? product.category.name : ''}"></td>
            <td>
                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-secondary btn-sm">Edit</a>
                <a th:href="@{/products/delete/{id}(id=${product.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này không?')">Delete</a>
            </td>
            <td>
                <a th:href="@{/cart/add/{id}(id=${product.id}, quantity=1)}" class="btn btn-warning btn-sm">
                    Add to Cart
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="d-flex justify-content-center align-items-center gap-2 mt-4" th:if="${totalPages > 1}">
        <a class="btn btn-outline-primary"
           th:if="${currentPage > 1}"
           th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, sort=${sort}, categoryId=${selectedCategoryId})}">
            Previous
        </a>

        <span class="fw-bold">
            Trang <span th:text="${currentPage}"></span> / <span th:text="${totalPages}"></span>
        </span>

        <a class="btn btn-outline-primary"
           th:if="${currentPage < totalPages}"
           th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, sort=${sort}, categoryId=${selectedCategoryId})}">
            Next
        </a>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
