<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <h2 class="text-center mb-4">GIỎ HÀNG</h2>

    <div th:if="${param.success}" class="alert alert-success">
        Đặt hàng thành công
    </div>

    <table class="table table-bordered align-middle">
        <thead class="table-dark">
        <tr>
            <th>Tên</th>
            <th>Giá</th>
            <th>Số lượng</th>
            <th>Tạm tính</th>
            <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(cartItems)}">
            <td colspan="5" class="text-center">Giỏ hàng trống</td>
        </tr>

        <tr th:each="item : ${cartItems}">
            <td th:text="${item.product.name}"></td>
            <td th:text="${item.product.price}"></td>
            <td>
                <form th:action="@{/cart/update}" method="post" class="d-flex gap-2">
                    <input type="hidden" name="productId" th:value="${item.product.id}">
                    <input type="number" name="quantity" th:value="${item.quantity}" min="1" class="form-control" style="width:90px;">
                    <button type="submit" class="btn btn-sm btn-primary">Update</button>
                </form>
            </td>
            <td th:text="${item.subtotal}"></td>
            <td>
                <a th:href="@{/cart/remove/{id}(id=${item.product.id})}" class="btn btn-sm btn-danger">Remove</a>
            </td>
        </tr>
        </tbody>
    </table>

    <h4 class="text-end">Tổng tiền: <span th:text="${total}"></span></h4>

    <div class="d-flex justify-content-between mt-3">
        <a th:href="@{/products}" class="btn btn-secondary">Tiếp tục mua</a>
        <a th:href="@{/checkout}" class="btn btn-success">Checkout</a>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
