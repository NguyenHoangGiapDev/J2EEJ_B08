<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #dfe2e6, #e7eaee);
            color: white;
            min-height: 100vh;
        }

        .checkout-wrapper {
            padding: 30px 0;
        }

        .checkout-card {
            background: #12213d;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
        }

        .form-control, .form-control:focus {
            background: #0f1b33;
            color: white;
            border: 1px solid #2e436c;
        }

        .form-control::placeholder {
            color: #aab4c8;
        }

        .table {
            background: white;
            color: black;
            border-radius: 12px;
            overflow: hidden;
        }

        .total-text {
            color: #00d084;
            font-weight: bold;
            font-size: 30px;
        }

        .btn-order {
            background: linear-gradient(90deg, #6b7cff, #b066ff);
            border: none;
            color: white;
            font-weight: 600;
        }

        .btn-back {
            background: #7b8794;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="container checkout-wrapper">
    <h2 class="mb-4">🛒 Thanh toán đơn hàng</h2>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="checkout-card">
                <h5 class="mb-3">📋 Tóm tắt đơn hàng</h5>

                <table class="table table-bordered align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Sản phẩm</th>
                        <th>SL</th>
                        <th>Thành tiền</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${cartItems}">
                        <td th:text="${item.product.name}"></td>
                        <td th:text="${item.quantity}"></td>
                        <td th:text="${item.subtotal} + ' đ'"></td>
                    </tr>
                    </tbody>
                </table>

                <div class="text-end mt-4">
                    <span>Tổng cộng: </span>
                    <span class="total-text" th:text="${total} + ' vnđ'"></span>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="checkout-card">
                <h5 class="mb-3">Thông tin giao hàng</h5>

                <form th:action="@{/checkout}" th:object="${orderForm}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Tài khoản</label>
                        <input type="text" th:field="*{username}" class="form-control" placeholder="Nhập tài khoản">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Họ và tên</label>
                        <input type="text" th:field="*{fullName}" class="form-control" placeholder="Nhập họ và tên">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Số điện thoại</label>
                        <input type="text" th:field="*{phone}" class="form-control" placeholder="Nhập số điện thoại">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Địa chỉ giao hàng</label>
                        <textarea th:field="*{address}" class="form-control" rows="4" placeholder="Nhập địa chỉ giao hàng"></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-order">Đặt hàng</button>
                        <a th:href="@{/cart}" class="btn btn-back">Quay lại giỏ hàng</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
